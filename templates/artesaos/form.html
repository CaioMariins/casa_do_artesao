<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>{% if form.instance.pk %}
        Editar Artesão
    {% else %}
        Cadastrar Artesão
    {% endif %}</h1>

    <form method="post">
    {% csrf_token %}

    {{ form.as_p }}

    
    {% if form.errors %}
        <div class="errors">
            {{ form.errors }}
        </div>
    {% endif %}
    <button type="submit">Salvar</button>
</form>
</body>
</html>
